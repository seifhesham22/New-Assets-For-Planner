  <g fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
    <line id="hinge-jamb" x1="8"  y1="6"  x2="8"  y2="18"/>
    <line id="latch-jamb" x1="88" y1="6"  x2="88" y2="18"/>
    <line id="leaf"       x1="8"  y1="12" x2="8"  y2="92"/>
